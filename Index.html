<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stake Mines Game (Hybrid)</title>
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; background-color: #121212; color: #e0e0e0; display:flex; align-items:center; justify-content:center; min-height:100vh; padding:1rem }
.game-container { background-color:#1e1e1e; padding:2rem; border-radius:1rem; box-shadow:0 4px 20px rgba(0,0,0,.5); width:100%; max-width:28rem; position:relative }
.grid { display:grid; grid-template-columns:repeat(5,1fr); gap:0.5rem }
.tile { width:100%; padding-top:100%; position:relative; cursor:pointer; background-color:#333; border-radius:.5rem; display:flex; justify-content:center; align-items:center; transition:all .15s ease-in-out; box-shadow:inset 0 2px 4px rgba(0,0,0,.4) }
.tile-content { position:absolute; inset:0; display:flex; justify-content:center; align-items:center; font-size:1.5rem }
.tile:hover:not(.revealed) { transform:scale(1.04); background-color:#444 }
.revealed-gem { background-color:#2c7744 }
.revealed-mine { background-color:#b91c1c }
.button { transition: all .15s ease-in-out; }
.button:hover { transform: translateY(-2px); box-shadow:0 6px 12px rgba(0,0,0,.35) }
.message { display:none }
@media (max-width:900px){ img{max-width:100%;height:auto} }
</style>
</head>
<body>
<div class="game-container">
  <h1 class="text-3xl font-bold text-center mb-6">Mines Game</h1>
  <div id="account-balance-display" class="text-lg font-semibold text-gray-400 text-center mb-2">Balance: $10.00</div>
  <div id="user-id-display" class="text-xs font-mono text-gray-500 text-center mb-4">User ID: Local</div>

  <div class="space-y-4 mb-6">
    <div class="flex items-center justify-between bg-[#2d2d2d] p-3 rounded-lg">
      <label for="mine-count" class="text-lg">Number of Mines:</label>
      <input type="number" id="mine-count" min="1" max="24" value="3" class="w-20 p-2 text-center rounded-md bg-[#1a1a1a] text-white" />
    </div>
    <div class="flex items-center justify-between bg-[#2d2d2d] p-3 rounded-lg">
      <label for="wager" class="text-lg">Wager:</label>
      <input type="number" id="wager" min="1" value="1" class="w-20 p-2 text-center rounded-md bg-[#1a1a1a] text-white" />
    </div>
    <div id="multiplier-display" class="text-center text-xl font-bold text-green-400">Multiplier: 1.00x</div>
  </div>

  <div id="game-grid" class="grid mb-6"></div>

  <div class="flex flex-wrap justify-center items-center gap-4">
    <button id="start-button" class="flex-1 py-3 bg-green-600 text-white font-bold rounded-lg shadow-md button">Start Game</button>
    <button id="cashout-button" class="flex-1 py-3 bg-yellow-500 text-black font-bold rounded-lg shadow-md button" disabled>Cash Out</button>
    <button id="tip-button" class="flex-1 py-3 bg-blue-600 text-white font-bold rounded-lg shadow-md button" disabled>Get Strategy Tip ✨</button>
    <button id="mute-button" class="flex-none px-3 py-2 bg-gray-600 text-white font-bold rounded-lg shadow-md button" title="Mute/Unmute Sounds">🔊</button>
  </div>

  <div id="message-box" class="mt-6 p-4 rounded-lg text-center font-semibold message"></div>
  <div id="loading-indicator" class="text-center mt-4 text-sm text-gray-400">Ready</div>
</div>

<!-- Sounds -->
<audio id="flip-sound" src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" preload="auto"></audio>
<audio id="win-sound"  src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg" preload="auto"></audio>
<audio id="lose-sound" src="https://actions.google.com/sounds/v1/cartoon/metal_thud_and_clang.ogg" preload="auto"></audio>

<script type="module">
let accountBalance = 10;
let minePositions = [];
let gemsFound = 0;
let isGameActive = false;
let initialWager = 0;
let muted = false;
let cashedOut = false;
const baseMultiplier = 1.05;
const gridSize = 25;

// Elements
const grid = document.getElementById('game-grid');
const startBtn = document.getElementById('start-button');
const cashoutBtn = document.getElementById('cashout-button');
const tipBtn = document.getElementById('tip-button');
const muteBtn = document.getElementById('mute-button');
const mineInput = document.getElementById('mine-count');
const wagerInput = document.getElementById('wager');
const multiplierDisplay = document.getElementById('multiplier-display');
const balanceDisplay = document.getElementById('account-balance-display');
const messageBox = document.getElementById('message-box');

const flipSound = document.getElementById('flip-sound');
const winSound = document.getElementById('win-sound');
const loseSound = document.getElementById('lose-sound');

const embeddedKey = ""; // Optional: embed key here
const geminiApiKey = embeddedKey || (typeof __gemini_api_key !== "undefined" ? __gemini_api_key : "");

// Helpers
function playSound(sound) { if (!muted && sound) sound.play(); }
function updateBalanceUI() { balanceDisplay.textContent = `Balance: $${accountBalance.toFixed(2)}`; }
function showMessage(msg, error=false) {
  messageBox.textContent = msg;
  messageBox.classList.remove('bg-red-700','bg-green-700');
  messageBox.classList.add(error ? 'bg-red-700' : 'bg-green-700');
  messageBox.style.display = 'block';
}
function createGrid() {
  grid.innerHTML = "";
  for (let i=0;i<gridSize;i++) {
    const tile=document.createElement('div');
    tile.className='tile';
    tile.dataset.index=i;
    tile.innerHTML='<div class="tile-content"></div>';
    tile.addEventListener('click',tileClick);
    grid.appendChild(tile);
  }
}
function placeMines(count){
  minePositions=[];const arr=[...Array(gridSize).keys()];
  for(let i=0;i<count;i++){minePositions.push(arr.splice(Math.floor(Math.random()*arr.length),1)[0]);}
}
function calcMultiplier(){return gemsFound===0?1:Math.pow(baseMultiplier,gemsFound)*(1+(minePositions.length*0.05));}
function updateMultiplier(){multiplierDisplay.textContent=`Multiplier: ${calcMultiplier().toFixed(2)}x`;}
function revealAll(){
  document.querySelectorAll('.tile').forEach((t,i)=>{
    const c=t.querySelector('.tile-content');
    if(minePositions.includes(i)){t.classList.add('revealed-mine');c.textContent='💣';}
    else{t.classList.add('revealed-gem');c.textContent='💎';}
  });
}

async function getTip(){
  if(!geminiApiKey){showMessage("Strategy tips unavailable.",true);return;}
  tipBtn.disabled=true;tipBtn.textContent="Thinking…";
  try{
    const res=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-05-20:generateContent?key=${geminiApiKey}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:`You are a minesweeper strategy expert. I am playing a 5x5 game with ${minePositions.length} mines. I have found ${gemsFound} gems. Suggest a general next-move strategy.`}]}]})
    });
    const out=await res.json();
    const tip=out?.candidates?.[0]?.content?.parts?.[0]?.text||"No tip.";
    showMessage(tip);
  }catch(e){console.error(e);showMessage("Tip failed.",true);}
  finally{tipBtn.disabled=false;tipBtn.textContent="Get Strategy Tip ✨";}
}

function tileClick(e){
  if(!isGameActive)return;
  const t=e.currentTarget;if(t.classList.contains('revealed-gem')||t.classList.contains('revealed-mine'))return;
  const idx=+t.dataset.index;const c=t.querySelector('.tile-content');
  if(minePositions.includes(idx)){t.classList.add('revealed-mine');c.textContent='💣';playSound(loseSound);endGame(false);}
  else{t.classList.add('revealed-gem');c.textContent='💎';gemsFound++;playSound(flipSound);updateMultiplier();cashoutBtn.disabled=false;}
}

function startGame(){
  const mines=+mineInput.value;const wager=+wagerInput.value;
  if(mines<1||mines>24||wager<=0||wager>accountBalance){showMessage("Invalid wager or mines.",true);return;}
  isGameActive=true;gemsFound=0;cashedOut=false;initialWager=wager;
  accountBalance-=wager;updateBalanceUI();createGrid();placeMines(mines);
  startBtn.disabled=true;cashoutBtn.disabled=true;mineInput.disabled=true;wagerInput.disabled=true;showMessage("");
  updateMultiplier();
}

function endGame(win){
  isGameActive=false;startBtn.disabled=false;mineInput.disabled=false;wagerInput.disabled=false;revealAll();
  if(win&&!cashedOut){cashedOut=true;const winAmt=initialWager*calcMultiplier();accountBalance+=winAmt;updateBalanceUI();showMessage(`Cashed out! Won $${winAmt.toFixed(2)}`);playSound(winSound);}
  else if(!win){showMessage("You hit a mine!",true);}
}

startBtn.addEventListener('click',startGame);
cashoutBtn.addEventListener('click',()=>endGame(true));
tipBtn.addEventListener('click',getTip);
muteBtn.addEventListener('click',()=>{muted=!muted;muteBtn.textContent=muted?'🔇':'🔊';});

createGrid();
updateBalanceUI();
if(!geminiApiKey){tipBtn.disabled=true;tipBtn.title="API key missing";}
</script>

</body>
</html>
